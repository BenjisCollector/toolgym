name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (numpy + pytest only)
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest

      - name: Byte-compile all sources
        run: python -m py_compile toolgym/*.py examples/*.py tests/*.py conftest.py

      - name: Run tests (numpy-only, no gymnasium)
        run: pytest -q

      - name: Smoke-run the Q-learning baseline
        run: python examples/train_qlearning.py 1500
